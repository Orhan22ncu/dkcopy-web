<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ürünler | DK Copy — Promosyon Kataloğu</title>
  <meta name="description" content="DK Copy promosyon ürünleri: ajanda, kalem seti, defter, organizer ve daha fazlası. 158 ürün, fiyatsız görsel katalog.">
  <meta property="og:title" content="Ürünler | DK Copy">
  <meta property="og:description" content="DK Copy promosyon kataloğu — 158 ürün, 8 kategori.">
  <meta property="og:image" content="images/print_solutions.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #1A1A2E;
      --color-accent:  #C89B3C;
      --color-bg:      #F8F5EE;
      --color-surface: #FFFFFF;
      --color-text:    #1A1A2E;
      --color-muted:   #9C9AA6;
      --color-on-dark: #F8F5EE;
      --font-heading:  'Playfair Display', Georgia, serif;
      --font-body:     'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --radius: 10px;
      --shadow: 0 2px 8px rgba(0,0,0,.07), 0 6px 20px rgba(0,0,0,.09);
      --shadow-hv: 0 6px 16px rgba(0,0,0,.10), 0 18px 40px rgba(0,0,0,.15);
      --header-h: 72px;
      --sidebar-w: 320px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font-body); background: var(--color-bg); color: var(--color-text); min-height: 100vh; display: flex; flex-direction: column; }
    img { max-width: 100%; height: auto; display: block; }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }

    .header {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 200;
      background: var(--color-primary);
      padding: 0; height: var(--header-h);
    }
    .header .container {
      max-width: 1200px; margin: 0 auto; padding: 0 2rem;
      height: 100%; display: flex; align-items: center; justify-content: space-between;
    }
    .header__logo { display: flex; align-items: center; gap: .5rem; }
    .header__logo img { width: 44px; height: 44px; object-fit: contain; }
    .header__logo span { font-family: var(--font-heading); font-size: 1.25rem; font-weight: 600; color: var(--color-on-dark); }
    .header__nav { display: flex; align-items: center; gap: 1.75rem; }
    .header__nav a { font-size: .875rem; font-weight: 500; color: var(--color-on-dark); opacity: .8; transition: opacity .2s; position: relative; }
    .header__nav a:hover, .header__nav a.active { opacity: 1; }
    .header__nav a.active::after { content:''; position:absolute; bottom:-4px; left:0; width:100%; height:2px; background:var(--color-accent); }
    .header__cta {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .5rem 1rem; background: var(--color-accent); color: var(--color-primary);
      border-radius: 8px; font-weight: 600; font-size: .875rem;
      transition: background .2s, transform .2s;
    }
    .header__cta:hover { background: #b8892e; transform: translateY(-1px); }
    .header__cta svg { flex-shrink: 0; }

    .page-body { padding-top: var(--header-h); flex: 1; display: flex; flex-direction: column; }

    .shop-bar {
      position: sticky; top: var(--header-h); z-index: 150;
      background: var(--color-primary);
      padding: .75rem 1.5rem; display: flex; align-items: center; gap: 1rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    .search-wrap { flex: 1; max-width: 440px; position: relative; }
    .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: .45; pointer-events: none; }
    #search {
      width: 100%; height: 38px; padding: 0 14px 0 36px;
      border: none; border-radius: 8px; background: rgba(255,255,255,.15);
      color: #fff; font-size: .875rem; font-family: var(--font-body); outline: none;
      transition: background .2s;
    }
    #search::placeholder { color: rgba(255,255,255,.5); }
    #search:focus { background: rgba(255,255,255,.22); }
    .grid-info-bar { flex: 1; color: rgba(255,255,255,.55); font-size: .8rem; padding-left: .5rem; }
    .cart-btn {
      flex-shrink: 0;
      background: rgba(255,255,255,.12); border: 1.5px solid rgba(255,255,255,.22);
      color: #fff; font-size: .8rem; font-weight: 600;
      padding: .45rem 1rem; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; gap: .5rem;
      transition: background .2s;
    }
    .cart-btn:hover { background: rgba(255,255,255,.2); }
    #cart-count {
      display: none; background: var(--color-accent); color: var(--color-primary);
      font-size: .7rem; font-weight: 700; padding: .1rem .45rem;
      border-radius: 100px; min-width: 1.3rem; text-align: center;
    }
    #cart-count.visible { display: inline-block; }

    .cat-tabs-wrap { background: var(--color-surface); border-bottom: 1px solid rgba(0,0,0,.08); }
    .cat-tabs {
      max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;
      display: flex; align-items: center; gap: .5rem;
      overflow-x: auto; scrollbar-width: none;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: .75rem 1.1rem; border: none; background: none;
      font-family: var(--font-body); font-size: .825rem; font-weight: 500;
      color: var(--color-muted); cursor: pointer;
      border-bottom: 2px solid transparent; transition: color .2s, border-color .2s;
    }
    .tab span { opacity: .65; font-size: .75rem; }
    .tab:hover { color: var(--color-text); }
    .tab.active { color: var(--color-primary); font-weight: 600; border-bottom-color: var(--color-accent); }

    .grid-section { flex: 1; padding: 1.5rem; max-width: 1200px; margin: 0 auto; width: 100%; }
    #product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--color-surface); border-radius: var(--radius);
      box-shadow: var(--shadow); transition: box-shadow .25s, transform .25s;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .card:hover { box-shadow: var(--shadow-hv); transform: translateY(-3px); }
    .card.hidden { display: none; }

    .card-img {
      position: relative; overflow: hidden;
      background: var(--color-bg); height: 260px;
      cursor: zoom-in;
    }
    .card-img img {
      width: 100%; height: 100%;
      object-fit: contain; object-position: center;
      transition: transform .3s;
    }

    .card-body { padding: .85rem; display: flex; flex-direction: column; gap: .5rem; flex: 1; }
    .card-code { font-weight: 700; font-size: .95rem; color: var(--color-primary); font-family: var(--font-heading); }
    .card-features {
      font-size: .75rem; color: var(--color-muted); line-height: 1.5;
      flex: 1;
    }
    .btn-add {
      margin-top: auto;
      padding: .55rem; border-radius: 8px; border: none;
      background: var(--color-accent); color: var(--color-primary);
      font-family: var(--font-body); font-size: .8rem; font-weight: 600;
      cursor: pointer; transition: background .2s, transform .2s;
    }
    .btn-add:hover { background: #b8892e; transform: translateY(-1px); }
    .btn-add.added { background: #2ecc71; color: #fff; cursor: default; }

    .lens {
      display: none; position: absolute; pointer-events: none;
      width: 140px; height: 140px; border-radius: 50%;
      border: 2px solid var(--color-accent);
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
      background-repeat: no-repeat; z-index: 10;
    }

    .cart-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35);
      z-index: 300;
    }
    .cart-overlay.open { display: block; }
    .cart-sidebar {
      position: fixed; top: 0; right: -340px; height: 100%;
      width: var(--sidebar-w); background: var(--color-surface);
      box-shadow: -4px 0 24px rgba(0,0,0,.15);
      display: flex; flex-direction: column; z-index: 301;
      transition: right .3s ease;
    }
    .cart-sidebar.open { right: 0; }
    .sidebar-head {
      background: var(--color-primary); color: var(--color-on-dark);
      padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between;
      font-weight: 600; font-size: 1rem;
    }
    .sidebar-head button { background: none; border: 1px solid rgba(255,255,255,.3); color: rgba(255,255,255,.7); padding: .3rem .7rem; border-radius: 6px; font-size: .75rem; cursor: pointer; }
    .sidebar-head button:hover { background: rgba(255,255,255,.1); }
    .sidebar-close-btn { background: none !important; border: none !important; color: rgba(255,255,255,.8) !important; font-size: 1.25rem !important; cursor: pointer; line-height: 1; padding: .25rem !important; }
    .cart-empty {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: .75rem; color: var(--color-muted); font-size: .9rem;
    }
    .cart-list {
      flex: 1; overflow-y: auto; padding: .75rem 1rem;
      display: none; flex-direction: column; gap: .6rem;
    }
    .cart-item {
      display: flex; align-items: center; gap: .75rem;
      background: var(--color-bg); border-radius: 8px; padding: .5rem .75rem;
    }
    .cart-item-img { width: 44px; height: 44px; object-fit: contain; border-radius: 6px; background: #fff; flex-shrink: 0; }
    .cart-item-code { flex: 1; font-weight: 600; font-size: .875rem; }
    .cart-item-remove {
      background: none; border: none; color: var(--color-muted);
      font-size: 1.1rem; cursor: pointer; line-height: 1; padding: .2rem;
    }
    .cart-item-remove:hover { color: #e74c3c; }
    .sidebar-footer { padding: 1rem; border-top: 1px solid rgba(0,0,0,.08); }
    .btn-wa {
      display: flex; align-items: center; justify-content: center; gap: .6rem;
      width: 100%; padding: .85rem; border-radius: 10px;
      background: #25D366; color: #fff; font-weight: 600; font-size: .95rem;
      text-decoration: none; transition: background .2s, transform .2s;
    }
    .btn-wa:hover:not(.disabled) { background: #1da851; transform: translateY(-1px); }
    .btn-wa.disabled { background: #ccc; cursor: not-allowed; pointer-events: none; }

    .no-results {
      display: none; text-align: center; color: var(--color-muted);
      padding: 3rem 1rem; font-size: .95rem;
    }
    .no-results.visible { display: block; }

    /* === Lightbox 2 === */
    .lb2 {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.8); z-index: 500;
      align-items: center; justify-content: center;
      padding: 1rem;
    }
    .lb2.open { display: flex; }
    .lb2-panel {
      position: relative;
      background: var(--color-surface); border-radius: 12px;
      display: flex; overflow: hidden;
      max-width: 900px; width: 100%; max-height: 90vh;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .lb2-close {
      position: absolute; top: .75rem; right: .75rem; z-index: 10;
      background: rgba(0,0,0,.55); border: none; color: #fff;
      font-size: 1.4rem; width: 2.25rem; height: 2.25rem; border-radius: 50%;
      cursor: pointer; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .lb2-close:hover { background: rgba(0,0,0,.85); }
    .lb2-left {
      flex: 0 0 55%; display: flex; flex-direction: column;
      background: var(--color-bg); min-height: 0;
    }
    .lb2-img-area {
      flex: 1; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      min-height: 0; padding: 1rem;
    }
    .lb2-main-img {
      max-width: 100%; max-height: 100%; object-fit: contain;
      cursor: zoom-in; transition: transform .25s ease;
      display: block; user-select: none;
    }
    .lb2-main-img.zoomed { transform: scale(2.5); cursor: zoom-out; }
    .lb2-thumbs {
      display: flex; gap: .5rem; padding: .6rem .75rem;
      justify-content: center; flex-wrap: wrap; flex-shrink: 0;
    }
    .lb2-thumb {
      width: 56px; height: 56px; border-radius: 6px; overflow: hidden;
      border: 2px solid transparent; background: #fff;
      cursor: pointer; padding: 0; transition: border-color .2s;
      flex-shrink: 0;
    }
    .lb2-thumb img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .lb2-thumb.active { border-color: var(--color-accent); }
    .lb2-thumb:hover { border-color: var(--color-primary); opacity: .85; }
    .lb2-right {
      flex: 0 0 45%; padding: 1.75rem 1.25rem 1.25rem;
      display: flex; flex-direction: column; gap: .75rem;
      overflow-y: auto; border-left: 1px solid rgba(0,0,0,.08);
    }
    .lb2-cat {
      font-size: .72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .08em; color: var(--color-accent);
    }
    .lb2-code {
      font-family: var(--font-heading); font-size: 2.2rem; font-weight: 700;
      color: var(--color-primary); line-height: 1;
    }
    .lb2-feats {
      font-size: .85rem; color: var(--color-muted); line-height: 1.7; flex: 1;
    }
    .lb2-add {
      margin-top: .5rem; padding: .75rem 1rem; font-size: .9rem;
      border-radius: 10px;
    }

    .footer { background: var(--color-primary); color: var(--color-on-dark); padding: 1.5rem 0; text-align: center; }
    .footer p { font-size: .8rem; opacity: .65; }

    @media (max-width: 768px) {
      .header__nav { display: none; }
      .header__logo span { font-size: 1.1rem; }
      #product-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
      .card-img { height: 200px; }
      .grid-info-bar { display: none; }
      .cart-sidebar { width: 100%; right: -100%; }
    }
    @media (max-width: 640px) {
      .lb2-panel { flex-direction: column; max-height: 95vh; border-radius: 8px; }
      .lb2-left { flex: 0 0 50%; }
      .lb2-right { flex: 1; padding: 1rem; border-left: none; border-top: 1px solid rgba(0,0,0,.08); }
      .lb2-code { font-size: 1.6rem; }
      .lb2-img-area { padding: .5rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>

bel":"Tohumlu & Kurşun","img":"images/katalog/tohumlu_ve_kursun_kalemler/tohumlu_ve_kursun_kalemler_5755_01.webp","imgs":["images/katalog/tohumlu_ve_kursun_kalemler/tohumlu_ve_kursun_kalemler_5755_01.webp"],"features":""}];
const WA_NUMBER = "905324900313";
const cart = new Map();
const BY_CODE = Object.fromEntries(PRODUCTS.map(p => [p.kod, p]));
let lb2Code = null;

// ── Features cleanup ─────────────────────────────────────
function cleanFeatLines(txt) {
  if (!txt) return [];
  return txt.split('\n').map(l => {
    l = l.trim();
    l = l.replace(/\s*\([^)]+\)$/, '');
    l = l.replace(/[^a-zA-ZçğışöüÇĞİŞÖÜ0-9&]+$/, '');
    l = l.replace(/\s+[A-Za-zÇĞİŞÖÜçğışöü]$/, '');
    return l.trim();
  }).filter(l => l.length >= 4 && /[A-Za-zÇĞİŞÖÜçğışöü]{2,}/.test(l));
}

function featsHTML(txt) {
  const lines = cleanFeatLines(txt);
  if (!lines.length) return '';
  return '<div class="card-features">' + lines.join('<br>') + '</div>';
}

function featsForLB(txt) {
  const lines = cleanFeatLines(txt);
  return lines.join('<br>');
}

// ── Kart üret ───────────────────────────────────────────
function buildCards() {
  const grid = document.getElementById('product-grid');
  PRODUCTS.forEach(p => {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.code = p.kod;
    div.dataset.kat  = p.kat;
    div.innerHTML = `
      <div class="card-img" onclick="openLB2('${p.kod}')">
        <img src="${p.img}" alt="Ürün ${p.kod}" loading="lazy" width="300" height="260">
      </div>
      <div class="card-body">
        <div class="card-code">${p.kod}</div>
        ${featsHTML(p.features)}
        <button class="btn-add" onclick="event.stopPropagation();addToCart('${p.kod}')">Sepete Ekle</button>
      </div>`;
    grid.appendChild(div);
  });
  document.querySelectorAll('.card-img').forEach(initLens);
}

// ── Kategori filtre ──────────────────────────────────────
let activeCat = 'all';
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
    btn.classList.add('active');
    btn.setAttribute('aria-selected','true');
    activeCat = btn.dataset.cat;
    applyFilters();
  });
});

function applyFilters() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const cards = document.querySelectorAll('.card[data-code]');
  let visible = 0;
  cards.forEach(card => {
    const catMatch = activeCat === 'all' || card.dataset.kat === activeCat;
    const code = card.dataset.code.toLowerCase();
    const match = catMatch && (!q || code.includes(q));
    card.classList.toggle('hidden', !match);
    if (match) visible++;
  });
  const infoEl = document.getElementById('grid-info');
  infoEl.textContent = q
    ? `${visible} sonuç: "${document.getElementById('search').value}" — hover: büyüteç · tıkla: detay`
    : `${visible} ürün — hover: büyüteç · tıkla: detay`;
  document.getElementById('no-results').classList.toggle('visible', visible === 0);
}

document.getElementById('search').addEventListener('input', applyFilters);

// ── Lens ────────────────────────────────────────────────
const ZOOM = 2.8, LS = 140;
function initLens(cardImg) {
  const img  = cardImg.querySelector('img');
  const lens = document.createElement('div');
  lens.className = 'lens';
  cardImg.appendChild(lens);
  cardImg.addEventListener('mousemove', e => {
    const cr = cardImg.getBoundingClientRect();
    const ir = img.getBoundingClientRect();
    const cx = e.clientX - cr.left, cy = e.clientY - cr.top;
    lens.style.left = (Math.max(LS/2, Math.min(cx, cr.width  - LS/2)) - LS/2) + 'px';
    lens.style.top  = (Math.max(LS/2, Math.min(cy, cr.height - LS/2)) - LS/2) + 'px';
    lens.style.display = 'block';
    const ix = e.clientX - ir.left, iy = e.clientY - ir.top;
    lens.style.backgroundImage    = `url('${img.src}')`;
    lens.style.backgroundSize     = `${ir.width*ZOOM}px ${ir.height*ZOOM}px`;
    lens.style.backgroundPosition = `${-(ix*ZOOM - LS/2)}px ${-(iy*ZOOM - LS/2)}px`;
  });
  cardImg.addEventListener('mouseleave', () => { lens.style.display = 'none'; });
}

// ── Lightbox 2 ──────────────────────────────────────────
function openLB2(kod) {
  const p = BY_CODE[kod];
  if (!p) return;
  lb2Code = kod;
  const main = document.getElementById('lb2-main');
  main.src = p.imgs[0];
  main.alt = 'Ürün ' + kod;
  main.classList.remove('zoomed');
  main.style.transformOrigin = 'center center';
  const thumbsEl = document.getElementById('lb2-thumbs');
  thumbsEl.innerHTML = '';
  if (p.imgs.length > 1) {
    p.imgs.forEach((src, i) => {
      const btn = document.createElement('button');
      btn.className = 'lb2-thumb' + (i === 0 ? ' active' : '');
      btn.setAttribute('aria-label', 'Görsel ' + (i + 1));
      const timg = document.createElement('img');
      timg.src = src;
      timg.alt = '';
      timg.loading = 'lazy';
      btn.appendChild(timg);
      btn.onclick = () => {
        main.src = src;
        main.classList.remove('zoomed');
        main.style.transformOrigin = 'center center';
        thumbsEl.querySelectorAll('.lb2-thumb').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      };
      thumbsEl.appendChild(btn);
    });
  }
  document.getElementById('lb2-cat').textContent = p.label;
  document.getElementById('lb2-code').textContent = p.kod;
  document.getElementById('lb2-feats').innerHTML = featsForLB(p.features);
  syncLB2Btn();
  document.getElementById('lb2').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function syncLB2Btn() {
  const btn = document.getElementById('lb2-add');
  if (!btn || !lb2Code) return;
  const inCart = cart.has(lb2Code);
  btn.textContent = inCart ? '\u2713 Eklendi' : 'Sepete Ekle';
  btn.classList.toggle('added', inCart);
}

function lb2AddCart() {
  if (!lb2Code) return;
  addToCart(lb2Code);
}

function closeLB2() {
  document.getElementById('lb2').classList.remove('open');
  document.body.style.overflow = '';
  lb2Code = null;
}

function lb2BackdropClick(e) {
  if (e.target === document.getElementById('lb2')) closeLB2();
}

function lb2ToggleZoom(img, e) {
  if (img.classList.contains('zoomed')) {
    img.classList.remove('zoomed');
    img.style.transformOrigin = 'center center';
    return;
  }
  const r = img.getBoundingClientRect();
  const x = ((e.clientX - r.left) / r.width * 100).toFixed(1) + '%';
  const y = ((e.clientY - r.top)  / r.height * 100).toFixed(1) + '%';
  img.style.transformOrigin = x + ' ' + y;
  img.classList.add('zoomed');
}

// ── Sepet ────────────────────────────────────────────────
function addToCart(code) {
  if (cart.has(code)) return;
  const p = BY_CODE[code];
  if (!p) return;
  cart.set(code, { code, img: p.img });
  syncButton(code);
  renderCart();
}

function syncButton(code) {
  const inCart = cart.has(code);
  document.querySelectorAll('.card[data-code="' + code + '"] .btn-add').forEach(btn => {
    btn.textContent = inCart ? '\u2713 Eklendi' : 'Sepete Ekle';
    btn.classList.toggle('added', inCart);
  });
  if (lb2Code === code) syncLB2Btn();
}

function removeFromCart(code) {
  cart.delete(code);
  syncButton(code);
  renderCart();
}

function clearCart() {
  [...cart.keys()].forEach(removeFromCart);
}

function renderCart() {
  const count   = cart.size;
  const countEl = document.getElementById('cart-count');
  const emptyEl = document.getElementById('cart-empty');
  const listEl  = document.getElementById('cart-list');
  const waBtn   = document.getElementById('btn-wa');
  countEl.textContent = count;
  countEl.classList.toggle('visible', count > 0);
  emptyEl.style.display = count === 0 ? 'flex' : 'none';
  listEl.style.display  = count === 0 ? 'none' : 'flex';
  waBtn.classList.toggle('disabled', count === 0);
  listEl.innerHTML = '';
  cart.forEach(({ code, img }) => {
    const item = document.createElement('div');
    item.className = 'cart-item';
    item.innerHTML = `
      <img class="cart-item-img" src="${img}" alt="${code}">
      <span class="cart-item-code">${code}</span>
      <button class="cart-item-remove" onclick="removeFromCart('${code}')" title="Kaldır">\u00d7</button>`;
    listEl.appendChild(item);
  });
  if (count > 0) {
    const codes = [...cart.keys()].join(', ');
    const msg = encodeURIComponent('Merhaba, a\u015fa\u011f\u0131daki promosyon \u00fcr\u00fcnlerini incelemek istiyorum:\n' + codes);
    waBtn.href = 'https://wa.me/' + WA_NUMBER + '?text=' + msg;
  }
}

function handleWA(e) {
  if (cart.size === 0) { e.preventDefault(); return false; }
  return true;
}

// ── Sepet toggle ────────────────────────────────────────
function toggleCart() {
  const sb = document.getElementById('cart-sidebar');
  const ov = document.getElementById('cart-overlay');
  const open = sb.classList.toggle('open');
  ov.classList.toggle('open', open);
  document.body.style.overflow = open ? 'hidden' : '';
}

function closeCart() {
  document.getElementById('cart-sidebar').classList.remove('open');
  document.getElementById('cart-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeLB2(); closeCart(); } });

// ── Init ────────────────────────────────────────────────
buildCards();
</script>
